trigger:
  branches:
    include:
      - main

variables:
  imageRepository: "todo-backend"
  containerRegistry: "todoacr-chhbdrh0gvdjehdv.azurecr.io"
  dockerfilePath: "Dockerfile"
  tag: "$(Build.BuildId)"
  azureSubscription: "todo-arm"
  acrServiceConnection: "todoAcr"
  ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
    appName: "todoBackend"
    envLabel: "prod"

stages:
  - stage: Build
    displayName: Build and push image (${{ variables.envLabel }})
    jobs:
      - job: Build
        pool:
          vmImage: "Default"
        steps:
          - script: |
              echo "=== Azure Pipeline Variables ==="
              echo "Branch: $(Build.SourceBranchName)"
              echo "Environment: $(envLabel)"
              echo "imageRepository: $(imageRepository)"
              echo "appName: $(appName)"
              echo "========================================"
            displayName: Log build variables
          - task: Docker@2
            displayName: Build Docker image
            inputs:
              command: build
              containerRegistry: $(acrServiceConnection)
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              buildContext: $(Build.SourcesDirectory)
              tags: |
                $(tag)
          - task: Docker@2
            displayName: Push Docker image
            inputs:
              command: push
              containerRegistry: $(acrServiceConnection)
              repository: $(imageRepository)
              tags: |
                $(tag)

  - stage: Deploy
    displayName: Deploy to App Service (${{ variables.envLabel }})
    dependsOn: Build
    jobs:
      - job: Deploy
        pool:
          vmImage: "Default"
        steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy container to Web App
            inputs:
              azureSubscription: $(azureSubscription)
              appName: $(appName)
              containers: $(containerRegistry)/$(imageRepository):$(tag)
